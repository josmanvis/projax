[package]
name = "pokemon"
version = "0.0.1"
edition = "2021"

[dependencies]
zed_extension_api = "0.7.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", features = ["json"] }
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"

[lib]
crate-type = ["cdylib"]
