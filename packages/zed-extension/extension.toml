schema_version = 1
id = "projax"
name = "Projax"
version = "0.1.0"
authors = ["Projax"]
description = "A Zed extension for viewing and managing Projax projects."
repository = "https://github.com/josetwentyfour/projax/tree/main/packages/zed-extension"

[slash_commands.projax_list]
description = "List all Projax projects with basic info."
requires_argument = false

[slash_commands.projax_show]
description = "Show detailed information about a specific project (tests, ports, git info)."
requires_argument = true

[slash_commands.projax_open]
description = "Get instructions to open a project in Zed."
requires_argument = true

[slash_commands.projax_run]
description = "Get instructions to run a script from a project."
requires_argument = true