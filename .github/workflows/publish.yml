name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build all packages
        run: pnpm run build

      - name: Copy README to CLI package
        run: cp README.md packages/cli/README.md

      - name: Publish to npm
        run: |
          cd packages/cli
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Package VS Code Extension
        run: |
          mkdir -p release
          pnpm --filter projax-vscode run package

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### Installation
            ```bash
            npm install -g projax@${{ steps.version.outputs.VERSION }}
            ```

            ### What's New
            See the [changelog](https://github.com/josmanvis/projax/blob/main/CHANGELOG.md) for details.

            ### Links
            - 📦 [npm Package](https://www.npmjs.com/package/projax)
            - 🌐 [Documentation](https://projax.dev)
            - 📂 [GitHub](https://github.com/josmanvis/projax)
          files: |
            release/*.vsix
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
